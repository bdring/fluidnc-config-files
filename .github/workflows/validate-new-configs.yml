name: Validate FluidNC config files

# This repo holds config.yaml files, not the FluidNC source -- the validator
# script, its shared core module, and the JSON Schema all live in the main
# bdring/FluidNC repo under tools/. This workflow fetches them fresh at CI
# time (see FLUIDNC_REF below) rather than vendoring a copy here, so configs
# are always checked against the CURRENT config file format as FluidNC
# evolves, with nothing to keep in sync by hand between the two repos.
#
# By default this only checks CHANGED files in a PR (or push), so introducing
# this workflow does not retroactively fail on every pre-existing config
# already committed here -- run it manually via workflow_dispatch with
# "validate_all" checked to audit everything at once.
#
# Runs in --permissive mode by default: FluidNC's real parser matches most
# section/field names and several enum values case-insensitively, and this
# repo accepts contributions from many different people with varying style,
# so casing differences alone shouldn't fail a PR. Set PERMISSIVE to "false"
# below to enforce strict canonical casing instead.

on:
  pull_request:
    paths:
      - "**/*.yaml"
      - "**/*.yml"
  push:
    branches: [main]
    paths:
      - "**/*.yaml"
      - "**/*.yml"
  workflow_dispatch:
    inputs:
      validate_all:
        description: "Validate every config file in the repo, not just changed files"
        type: boolean
        default: false

env:
  # Branch/tag of bdring/FluidNC to fetch the validator + schema from.
  FLUIDNC_REF: main
  # "true" (default) or "false" -- see note above.
  PERMISSIVE: "true"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out this repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed to diff against the base branch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch validator tools from bdring/FluidNC
        run: |
          set -euo pipefail
          mkdir -p .fluidnc-tools
          base="https://raw.githubusercontent.com/bdring/FluidNC/${FLUIDNC_REF}/tools"
          curl -fsSL "$base/validate_fluidnc_config.py" -o .fluidnc-tools/validate_fluidnc_config.py
          curl -fsSL "$base/fluidnc_validate_core.py"   -o .fluidnc-tools/fluidnc_validate_core.py
          curl -fsSL "$base/fluidnc-config-schema.json" -o .fluidnc-tools/fluidnc-config-schema.json
          echo "Fetched tools from bdring/FluidNC@${FLUIDNC_REF}"

      - name: Install validator dependencies
        run: pip install pyyaml jsonschema

      - name: Determine which files to check
        id: files
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.validate_all }}" = "true" ]; then
            files=$(find . -type d -name ".fluidnc-tools" -prune -o \
                           -type f \( -iname '*.yaml' -o -iname '*.yml' \) -print)
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            files=$(git diff --name-only --diff-filter=ACMR "origin/${{ github.base_ref }}...HEAD" -- '*.yaml' '*.yml' || true)
          else
            # push to main: diff against the previous commit
            files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}" -- '*.yaml' '*.yml' 2>/dev/null || true)
          fi
          {
            echo "files<<FILES_EOF"
            echo "$files"
            echo "FILES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate config files
        if: steps.files.outputs.files != ''
        shell: bash
        run: |
          set -uo pipefail
          permissive_flag=""
          if [ "${PERMISSIVE}" = "true" ]; then
            permissive_flag="--permissive"
          fi

          fail=0
          checked=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if [ ! -f "$f" ]; then
              echo "Skipping (deleted): $f"
              continue
            fi
            checked=$((checked + 1))
            echo "::group::Validating $f"
            if ! python3 .fluidnc-tools/validate_fluidnc_config.py --no-auto-install \
                 --schema .fluidnc-tools/fluidnc-config-schema.json $permissive_flag "$f"; then
              fail=1
            fi
            echo "::endgroup::"
          done <<< "${{ steps.files.outputs.files }}"

          echo "Checked $checked config file(s)."
          if [ "$fail" != "0" ]; then
            echo "One or more config files failed schema validation. See groups above for details."
            exit 1
          fi

      - name: No config files changed
        if: steps.files.outputs.files == ''
        run: echo "No changed .yaml files matched -- nothing to validate."
